version: "3.9"
services:
  feeder:
    build:
      context: .
      dockerfile: packages/fastapi_feeder/Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/'); print('ok')\" || exit 1"]
      interval: 5s
      retries: 5

  consumer:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    depends_on:
      - feeder
    environment:
      FEEDER_URL: "http://feeder:8000"
